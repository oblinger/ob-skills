<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="1800" height="960" style="background:white" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#1e1e1e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="40" font-size="30" fill="#1e1e1e" text-anchor="middle" font-weight="600">CAE Architecture</text>

  <!-- Boxes -->
  <rect x="40"  y="100" width="220" height="120" rx="10" fill="#fff3f3" stroke="#1e1e1e" stroke-width="2"/>
  <rect x="340" y="100" width="220" height="120" rx="10" fill="#bac8ff" stroke="#1e1e1e" stroke-width="2"/>
  <rect x="640" y="100" width="220" height="120" rx="10" fill="#bac8ff" stroke="#1e1e1e" stroke-width="2"/>
  <rect x="340" y="320" width="220" height="120" rx="10" fill="#fff9db" stroke="#1e1e1e" stroke-width="2"/>
  <rect x="640" y="320" width="220" height="120" rx="10" fill="#ebfbee" stroke="#1e1e1e" stroke-width="2"/>

  <!-- Box labels -->
  <text x="150" y="155" font-size="24" fill="#1e1e1e" text-anchor="middle" font-weight="600">CLI</text>
  <text x="150" y="185" font-size="16" fill="#555" text-anchor="middle">(clap)</text>
  <text x="450" y="155" font-size="24" fill="#1e1e1e" text-anchor="middle" font-weight="600">Scheduler</text>
  <text x="450" y="185" font-size="16" fill="#555" text-anchor="middle">(priority queue)</text>
  <text x="750" y="155" font-size="24" fill="#1e1e1e" text-anchor="middle" font-weight="600">Worker Pool</text>
  <text x="750" y="185" font-size="16" fill="#555" text-anchor="middle">(N threads)</text>
  <text x="450" y="375" font-size="24" fill="#1e1e1e" text-anchor="middle" font-weight="600">TaskStore</text>
  <text x="450" y="405" font-size="16" fill="#555" text-anchor="middle">(SQLite)</text>
  <text x="750" y="385" font-size="22" fill="#1e1e1e" text-anchor="middle" font-weight="600">RetryManager</text>

  <!-- ARROWS -->
  <!-- CLI -> Scheduler -->
  <line x1="260" y1="160" x2="340" y2="160" stroke="#1e1e1e" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="300" y="148" font-size="14" fill="#1971c2" text-anchor="middle" font-style="italic">submit</text>

  <!-- Scheduler -> Worker Pool -->
  <line x1="560" y1="160" x2="640" y2="160" stroke="#1e1e1e" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="600" y="148" font-size="14" fill="#1971c2" text-anchor="middle" font-style="italic">dispatch</text>

  <!-- Scheduler -> TaskStore -->
  <line x1="450" y1="220" x2="450" y2="320" stroke="#1e1e1e" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="495" y="275" font-size="14" fill="#1971c2" text-anchor="middle" font-style="italic">persist</text>

  <!-- Worker Pool -> RetryManager -->
  <line x1="750" y1="220" x2="750" y2="320" stroke="#1e1e1e" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="800" y="275" font-size="14" fill="#1971c2" text-anchor="middle" font-style="italic">on failure</text>
</svg>