<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 1000" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrowCfg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8e44ad"/>
    </marker>
    <marker id="arrowMet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0a8a8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="1000" fill="#ffffff"/>
  <text x="490" y="38" text-anchor="middle" font-size="30" font-weight="bold" fill="#222">Real-Time Analytics Platform — Layered Architecture</text>

  <!-- LAYER BANDS -->
  <g font-size="24" font-weight="bold" fill="#aab2bc" text-anchor="start">
    <text x="10" y="118">SOURCES</text>
    <text x="10" y="228">INGEST</text>
    <text x="10" y="345">BUS</text>
    <text x="10" y="520">PROCESS</text>
    <text x="10" y="770">SERVE</text>
    <text x="10" y="918">CLIENTS</text>
  </g>

  <!-- ============ SOLID DATA EDGES (10) ============ -->
  <g fill="none" stroke="#444" stroke-width="2.4" marker-end="url(#arrow)">
    <path d="M385,120 C385,150 430,153 452,166"/>          <!-- web-sdk to ingest-gw -->
    <path d="M595,120 C595,150 550,153 528,166"/>          <!-- order-svc to ingest-gw -->
    <path d="M490,224 L490,276"/>                           <!-- ingest-gw to kafka-bus -->
    <path d="M455,344 C418,388 418,410 455,428"/>          <!-- kafka-bus to enrich-proc -->
    <path d="M525,428 C562,410 562,388 525,344"/>          <!-- enrich-proc to kafka-bus -->
    <path d="M580,456 L700,456"/>                           <!-- enrich-proc to profile-db -->
    <path d="M490,344 C490,460 490,520 490,556"/>          <!-- kafka-bus to agg-proc -->
    <path d="M435,584 C370,624 370,660 370,694"/>          <!-- agg-proc to serving-store -->
    <path d="M540,722 C500,722 482,722 460,722"/>          <!-- query-api to serving-store -->
    <path d="M595,856 L595,756"/>                           <!-- dashboard to query-api -->
  </g>

  <!-- ============ CONFIG-SVC DASHED FAN-OUT (4) ============ -->
  <g fill="none" stroke="#8e44ad" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#arrowCfg)">
    <path d="M120,510 C120,200 280,176 420,176"/>         <!-- to ingest-gw -->
    <path d="M120,522 C200,462 300,456 420,456"/>         <!-- to enrich-proc -->
    <path d="M120,540 C230,566 320,584 420,584"/>         <!-- to agg-proc -->
    <path d="M128,572 C200,730 410,736 540,736"/>         <!-- to query-api -->
  </g>

  <!-- ============ METRICS-COL DASHED FAN-OUT (4) ============ -->
  <g fill="none" stroke="#0a8a8a" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#arrowMet)">
    <path d="M860,510 C860,200 700,176 560,176"/>         <!-- to ingest-gw -->
    <path d="M860,522 C770,462 680,456 560,456"/>         <!-- to enrich-proc -->
    <path d="M860,540 C750,568 660,584 560,584"/>          <!-- to agg-proc -->
    <path d="M852,572 C780,712 720,738 660,738"/>         <!-- to query-api -->
  </g>

  <!-- ============ EDGE LABELS (24px) ============ -->
  <g font-size="24" fill="#333" text-anchor="middle">
    <rect x="320" y="132" width="148" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="394" y="152">click (HTTPS)</text>
    <rect x="512" y="132" width="150" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="587" y="152">order (HTTPS)</text>
    <rect x="498" y="238" width="200" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="598" y="258">publish raw events</text>
    <rect x="282" y="372" width="186" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="375" y="392">consume raw topic</text>
    <rect x="525" y="356" width="210" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="630" y="376">publish enriched</text>
    <rect x="595" y="432" width="160" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="675" y="452">lookup profile</text>
    <rect x="500" y="522" width="210" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="605" y="542">consume enriched</text>
    <rect x="232" y="618" width="180" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="322" y="638">write aggregates</text>
    <rect x="415" y="662" width="170" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="500" y="682">read aggregates</text>
    <rect x="600" y="800" width="150" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="675" y="820">query (REST)</text>
  </g>
  <!-- config labels (purple) -->
  <g font-size="24" fill="#8e44ad" text-anchor="middle">
    <rect x="178" y="162" width="210" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="283" y="182">config: sampling</text>
    <rect x="170" y="432" width="170" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="255" y="452">config: joins</text>
    <rect x="160" y="560" width="200" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="260" y="580">config: windows</text>
    <rect x="230" y="748" width="200" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="330" y="768">config: flags</text>
  </g>
  <!-- metrics labels (teal) -->
  <g font-size="24" fill="#0a8a8a" text-anchor="middle">
    <rect x="648" y="162" width="160" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="728" y="182">scrape /metrics</text>
    <rect x="690" y="430" width="160" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="770" y="450">scrape /metrics</text>
    <rect x="690" y="560" width="160" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="770" y="580">scrape /metrics</text>
    <rect x="700" y="700" width="160" height="26" fill="#ffffff" opacity="0.92"/>
    <text x="780" y="720">scrape /metrics</text>
  </g>

  <!-- ============ NODES ============ -->
  <!-- external #e7f0ff/#3b6fb0 ; container #dff5e6/#2e8b57 ; datastore #fde9d9/#c97a2b ; bus #fff2cc/#c9a227 ; config #f3e1f3/#8e44ad ; metrics #d6f3f3/#0a8a8a -->
  <g text-anchor="middle">
    <!-- SOURCES -->
    <g>
      <rect x="310" y="62" width="150" height="58" rx="8" fill="#e7f0ff" stroke="#3b6fb0" stroke-width="2.6"/>
      <text x="385" y="88" font-size="24" font-weight="bold" fill="#1f3f63">web-sdk</text>
      <text x="385" y="110" font-size="18" fill="#33536f">Event SDK</text>
    </g>
    <g>
      <rect x="520" y="62" width="150" height="58" rx="8" fill="#e7f0ff" stroke="#3b6fb0" stroke-width="2.6"/>
      <text x="595" y="88" font-size="24" font-weight="bold" fill="#1f3f63">order-svc</text>
      <text x="595" y="110" font-size="18" fill="#33536f">Order Service</text>
    </g>
    <!-- INGEST -->
    <g>
      <rect x="415" y="166" width="150" height="58" rx="8" fill="#dff5e6" stroke="#2e8b57" stroke-width="2.6"/>
      <text x="490" y="192" font-size="24" font-weight="bold" fill="#1d5e3a">ingest-gw</text>
      <text x="490" y="214" font-size="18" fill="#2e6e4a">Ingest Gateway</text>
    </g>
    <!-- BUS / hub -->
    <g>
      <rect x="415" y="286" width="150" height="58" rx="14" fill="#fff2cc" stroke="#c9a227" stroke-width="3"/>
      <text x="490" y="312" font-size="24" font-weight="bold" fill="#7a6210">kafka-bus</text>
      <text x="490" y="334" font-size="18" fill="#8a701a">Event Bus · hub</text>
    </g>
    <!-- PROCESS -->
    <g>
      <rect x="415" y="428" width="150" height="58" rx="8" fill="#dff5e6" stroke="#2e8b57" stroke-width="2.6"/>
      <text x="490" y="454" font-size="24" font-weight="bold" fill="#1d5e3a">enrich-proc</text>
      <text x="490" y="476" font-size="18" fill="#2e6e4a">Enrichment</text>
    </g>
    <g>
      <rect x="415" y="556" width="150" height="58" rx="8" fill="#dff5e6" stroke="#2e8b57" stroke-width="2.6"/>
      <text x="490" y="582" font-size="24" font-weight="bold" fill="#1d5e3a">agg-proc</text>
      <text x="490" y="604" font-size="18" fill="#2e6e4a">Aggregation</text>
    </g>
    <g>
      <rect x="700" y="428" width="150" height="58" rx="14" fill="#fde9d9" stroke="#c97a2b" stroke-width="2.6"/>
      <text x="775" y="454" font-size="24" font-weight="bold" fill="#8a4e16">profile-db</text>
      <text x="775" y="476" font-size="18" fill="#9a5e26">Profile DB</text>
    </g>
    <!-- SERVE -->
    <g>
      <rect x="310" y="694" width="150" height="58" rx="14" fill="#fde9d9" stroke="#c97a2b" stroke-width="2.6"/>
      <text x="385" y="720" font-size="23" font-weight="bold" fill="#8a4e16">serving-store</text>
      <text x="385" y="742" font-size="18" fill="#9a5e26">Serving Store</text>
    </g>
    <g>
      <rect x="520" y="694" width="150" height="58" rx="8" fill="#dff5e6" stroke="#2e8b57" stroke-width="2.6"/>
      <text x="595" y="720" font-size="24" font-weight="bold" fill="#1d5e3a">query-api</text>
      <text x="595" y="742" font-size="18" fill="#2e6e4a">Query API</text>
    </g>
    <!-- CLIENTS -->
    <g>
      <rect x="520" y="856" width="150" height="58" rx="8" fill="#e7f0ff" stroke="#3b6fb0" stroke-width="2.6"/>
      <text x="595" y="882" font-size="24" font-weight="bold" fill="#1f3f63">dashboard</text>
      <text x="595" y="904" font-size="18" fill="#33536f">Dashboard UI</text>
    </g>
    <!-- OPS -->
    <g>
      <rect x="45" y="505" width="150" height="64" rx="8" fill="#f3e1f3" stroke="#8e44ad" stroke-width="2.6"/>
      <text x="120" y="533" font-size="24" font-weight="bold" fill="#5e2a72">config-svc</text>
      <text x="120" y="555" font-size="18" fill="#6e3a82">Config Service</text>
    </g>
    <g>
      <rect x="785" y="505" width="150" height="64" rx="8" fill="#d6f3f3" stroke="#0a8a8a" stroke-width="2.6"/>
      <text x="860" y="533" font-size="24" font-weight="bold" fill="#0a6060">metrics-col</text>
      <text x="860" y="555" font-size="18" fill="#1a7070">Metrics Collector</text>
    </g>
  </g>

  <!-- ============ LEGEND ============ -->
  <g font-size="20" fill="#333">
    <rect x="30" y="930" width="620" height="58" rx="7" fill="#fafafa" stroke="#ccc"/>
    <line x1="46" y1="952" x2="92" y2="952" stroke="#444" stroke-width="2.4" marker-end="url(#arrow)"/>
    <text x="100" y="958">solid = data flow</text>
    <line x1="290" y1="952" x2="336" y2="952" stroke="#8e44ad" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#arrowCfg)"/>
    <text x="344" y="958">dashed = config</text>
    <line x1="46" y1="978" x2="92" y2="978" stroke="#0a8a8a" stroke-width="2.2" stroke-dasharray="7,5" marker-end="url(#arrowMet)"/>
    <text x="100" y="984">dashed = metrics (observability)</text>
  </g>
</svg>
