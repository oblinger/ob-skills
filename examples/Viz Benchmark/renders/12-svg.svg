<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 1490" width="1160" height="1490" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrowD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b5651d"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1160" height="1490" fill="#ffffff"/>

  <!-- ===================== LANES (vertical) ===================== -->
  <!-- Applicant -->
  <rect x="20"  y="60" width="280" height="1410" fill="#eef6ff" stroke="#9bbede" stroke-width="2"/>
  <!-- Loan Officer -->
  <rect x="300" y="60" width="280" height="1410" fill="#eefaf0" stroke="#9bd6a6" stroke-width="2"/>
  <!-- Underwriting -->
  <rect x="580" y="60" width="280" height="1410" fill="#fff5e8" stroke="#e0bd86" stroke-width="2"/>
  <!-- Funding -->
  <rect x="860" y="60" width="280" height="1410" fill="#fbeef6" stroke="#d79bc4" stroke-width="2"/>

  <!-- lane headers -->
  <rect x="20"  y="60" width="280" height="46" fill="#cfe4f7" stroke="#9bbede" stroke-width="2"/>
  <rect x="300" y="60" width="280" height="46" fill="#cfeed6" stroke="#9bd6a6" stroke-width="2"/>
  <rect x="580" y="60" width="280" height="46" fill="#f6e3c4" stroke="#e0bd86" stroke-width="2"/>
  <rect x="860" y="60" width="280" height="46" fill="#f4cfe6" stroke="#d79bc4" stroke-width="2"/>
  <text x="160"  y="91" text-anchor="middle" font-size="28" font-weight="bold" fill="#1f4e79">Applicant</text>
  <text x="440"  y="91" text-anchor="middle" font-size="28" font-weight="bold" fill="#246b39">Loan Officer</text>
  <text x="720"  y="91" text-anchor="middle" font-size="28" font-weight="bold" fill="#9a6314">Underwriting</text>
  <text x="1000" y="91" text-anchor="middle" font-size="28" font-weight="bold" fill="#8f2d70">Funding</text>

  <!-- title -->
  <text x="20" y="40" font-size="30" font-weight="bold" fill="#222">Mortgage Loan Application — Swimlane Process</text>

  <!-- ===================== EDGES ===================== -->
  <!-- styles: solid #444 forward, dashed #b5651d backward loops -->
  <g fill="none" stroke="#444" stroke-width="2.5">

    <!-- N1(160,180) -> N4(440,180) : application submitted -->
    <path d="M280,180 L320,180" marker-end="url(#arrow)"/>

    <!-- N2(160,320) -> N4(440,212) : documents attached -->
    <path d="M280,320 C330,320 320,222 320,212" marker-end="url(#arrow)"/>

    <!-- N4(440,180) -> N5(440,460) : logged -->
    <path d="M440,212 L440,428" marker-end="url(#arrow)"/>

    <!-- N5(440,460) -> N6(440,600) : incomplete -->
    <path d="M412,492 L412,568" marker-end="url(#arrow)"/>

    <!-- N5(440,460) -> N7(440,740) : complete (curve right around N6) -->
    <path d="M508,460 C560,470 560,740 508,740" marker-end="url(#arrow)"/>

    <!-- N7(440,740) -> N8(720,860) : file ready for review -->
    <path d="M520,762 C620,790 620,838 600,852" marker-end="url(#arrow)"/>

    <!-- N3(160,460) -> N4(440,180) : corrected documents -->
    <path d="M200,428 C220,300 280,210 318,196" marker-end="url(#arrow)"/>

    <!-- N8(720,860) -> N9(720,980) : assessment done -->
    <path d="M720,892 L720,948" marker-end="url(#arrow)"/>

    <!-- N9(720,980) -> N10(720,1120) : approved -->
    <path d="M692,1012 L692,1088" marker-end="url(#arrow)"/>

    <!-- N9(720,980) -> N11(720,1260) : rejected (curve right) -->
    <path d="M788,980 C840,990 840,1260 788,1260" marker-end="url(#arrow)"/>

    <!-- N10(720,1120) -> N12(1000,1120) : conditional approval -->
    <path d="M840,1120 L880,1120" marker-end="url(#arrow)"/>

    <!-- N12(1000,1120) -> N13(1000,1260) : package signed -->
    <path d="M1000,1152 L1000,1228" marker-end="url(#arrow)"/>

    <!-- N13(1000,1260) -> N14(1000,1400) : funds released -->
    <path d="M1000,1292 L1000,1368" marker-end="url(#arrow)"/>
  </g>

  <!-- dashed backward loops -->
  <g fill="none" stroke="#b5651d" stroke-width="2.5" stroke-dasharray="9,6">
    <!-- N6(440,600) -> N3(160,460) : missing items requested -->
    <path d="M320,592 C240,560 220,510 215,496" marker-end="url(#arrowD)"/>

    <!-- N9(720,980) -> N6(440,600) : needs more info -->
    <path d="M610,968 C400,920 400,720 408,636" marker-end="url(#arrowD)"/>
  </g>

  <!-- ===================== EDGE LABELS ===================== -->
  <g font-size="19" fill="#333">
    <text x="300" y="142" text-anchor="middle">application submitted</text>
    <text x="296" y="262" text-anchor="middle">documents attached</text>
    <text x="448" y="328" >logged</text>
    <text x="420" y="534" >incomplete</text>
    <text x="566" y="560" >complete</text>
    <text x="560" y="812" >file ready</text>
    <text x="222" y="375" text-anchor="middle">corrected docs</text>
    <text x="728" y="924" >assessment done</text>
    <text x="700" y="1058" text-anchor="end">approved</text>
    <text x="846" y="1230" >rejected</text>
    <text x="860" y="1085" text-anchor="middle">conditional approval</text>
    <text x="1010" y="1198" >package signed</text>
    <text x="1010" y="1338" >funds released</text>
  </g>
  <g font-size="19" fill="#8a4d12">
    <text x="230" y="556" text-anchor="middle">missing items requested</text>
    <text x="360" y="800" text-anchor="middle">needs more info</text>
  </g>

  <!-- ===================== NODES ===================== -->
  <!-- helper conventions: start=green, step=#cfe0f5 blue, decision=amber diamond-ish, end=grey/red -->

  <!-- N1 start (Applicant) -->
  <g>
    <rect x="40" y="150" width="240" height="60" rx="30" fill="#bfe6c6" stroke="#2f8a44" stroke-width="2.5"/>
    <text x="160" y="186" text-anchor="middle" font-size="22" font-weight="bold" fill="#194d27">N1 Submit application</text>
  </g>

  <!-- N2 start (Applicant) -->
  <g>
    <rect x="40" y="290" width="240" height="60" rx="30" fill="#bfe6c6" stroke="#2f8a44" stroke-width="2.5"/>
    <text x="160" y="318" text-anchor="middle" font-size="21" fill="#194d27">N2 Upload income &amp;</text>
    <text x="160" y="340" text-anchor="middle" font-size="21" fill="#194d27">asset documents</text>
  </g>

  <!-- N3 step (Applicant) -->
  <g>
    <rect x="40" y="430" width="240" height="60" rx="8" fill="#cfe0f5" stroke="#3a6ea5" stroke-width="2.5"/>
    <text x="160" y="458" text-anchor="middle" font-size="21" fill="#1f3a5c">N3 Resubmit</text>
    <text x="160" y="480" text-anchor="middle" font-size="21" fill="#1f3a5c">corrected documents</text>
  </g>

  <!-- N4 step (Loan Officer) -->
  <g>
    <rect x="320" y="150" width="240" height="60" rx="8" fill="#cfe0f5" stroke="#3a6ea5" stroke-width="2.5"/>
    <text x="440" y="178" text-anchor="middle" font-size="21" fill="#1f3a5c">N4 Receive &amp; log</text>
    <text x="440" y="200" text-anchor="middle" font-size="21" fill="#1f3a5c">application</text>
  </g>

  <!-- N5 decision (Loan Officer) -->
  <g>
    <rect x="324" y="430" width="232" height="60" rx="8" fill="#ffe3a3" stroke="#cc8a00" stroke-width="3"/>
    <text x="440" y="458" text-anchor="middle" font-size="21" font-weight="bold" fill="#6b4900">N5 Verify document</text>
    <text x="440" y="480" text-anchor="middle" font-size="21" font-weight="bold" fill="#6b4900">completeness ?</text>
  </g>

  <!-- N6 step (Loan Officer) -->
  <g>
    <rect x="320" y="570" width="240" height="60" rx="8" fill="#cfe0f5" stroke="#3a6ea5" stroke-width="2.5"/>
    <text x="440" y="606" text-anchor="middle" font-size="21" fill="#1f3a5c">N6 Request missing items</text>
  </g>

  <!-- N7 step (Loan Officer) -->
  <g>
    <rect x="320" y="710" width="240" height="60" rx="8" fill="#cfe0f5" stroke="#3a6ea5" stroke-width="2.5"/>
    <text x="440" y="738" text-anchor="middle" font-size="21" fill="#1f3a5c">N7 Order credit report</text>
    <text x="440" y="760" text-anchor="middle" font-size="21" fill="#1f3a5c">&amp; appraisal</text>
  </g>

  <!-- N8 step (Underwriting) -->
  <g>
    <rect x="600" y="830" width="240" height="60" rx="8" fill="#cfe0f5" stroke="#3a6ea5" stroke-width="2.5"/>
    <text x="720" y="866" text-anchor="middle" font-size="21" fill="#1f3a5c">N8 Assess creditworthiness</text>
  </g>

  <!-- N9 decision (Underwriting) -->
  <g>
    <rect x="604" y="950" width="232" height="60" rx="8" fill="#ffe3a3" stroke="#cc8a00" stroke-width="3"/>
    <text x="720" y="986" text-anchor="middle" font-size="21" font-weight="bold" fill="#6b4900">N9 Underwriting decision ?</text>
  </g>

  <!-- N10 step (Underwriting) -->
  <g>
    <rect x="600" y="1090" width="240" height="60" rx="8" fill="#cfe0f5" stroke="#3a6ea5" stroke-width="2.5"/>
    <text x="720" y="1118" text-anchor="middle" font-size="21" fill="#1f3a5c">N10 Issue conditional</text>
    <text x="720" y="1140" text-anchor="middle" font-size="21" fill="#1f3a5c">approval</text>
  </g>

  <!-- N11 end (Underwriting) -->
  <g>
    <rect x="600" y="1230" width="240" height="60" rx="30" fill="#f3c4c4" stroke="#b03333" stroke-width="2.5"/>
    <text x="720" y="1266" text-anchor="middle" font-size="22" font-weight="bold" fill="#7a1f1f">N11 Decline application</text>
  </g>

  <!-- N12 step (Funding) -->
  <g>
    <rect x="880" y="1090" width="240" height="60" rx="8" fill="#cfe0f5" stroke="#3a6ea5" stroke-width="2.5"/>
    <text x="1000" y="1118" text-anchor="middle" font-size="21" fill="#1f3a5c">N12 Prepare closing</text>
    <text x="1000" y="1140" text-anchor="middle" font-size="21" fill="#1f3a5c">package</text>
  </g>

  <!-- N13 step (Funding) -->
  <g>
    <rect x="880" y="1230" width="240" height="60" rx="8" fill="#cfe0f5" stroke="#3a6ea5" stroke-width="2.5"/>
    <text x="1000" y="1266" text-anchor="middle" font-size="21" fill="#1f3a5c">N13 Disburse loan funds</text>
  </g>

  <!-- N14 end (Funding) -->
  <g>
    <rect x="880" y="1370" width="240" height="60" rx="30" fill="#cdeccd" stroke="#2f8a44" stroke-width="2.5"/>
    <text x="1000" y="1398" text-anchor="middle" font-size="21" font-weight="bold" fill="#194d27">N14 Notify borrower</text>
    <text x="1000" y="1420" text-anchor="middle" font-size="21" font-weight="bold" fill="#194d27">of funding</text>
  </g>

</svg>
