<svg xmlns="http://www.w3.org/2000/svg" width="552" height="338" viewBox="0 0 552 338" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="552" height="338" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="28" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52"># </tspan><tspan font-weight="bold" fill="#b5651d">{{HOSTNAME}}</tspan></text>
<text x="16" y="50" xml:space="preserve"><tspan fill="#1a1a2e">**Acquired:** </tspan><tspan fill="#b5651d">{{PURCHASE_DATE}}</tspan></text>
<text x="16" y="74" xml:space="preserve"><tspan fill="#2d5b7b">## Specs</tspan></text>
<text x="16" y="96" xml:space="preserve"><tspan fill="#1a1a2e">- **CPU:** </tspan><tspan fill="#3a7d6e">{{cpu model + class}}</tspan><tspan fill="#9aa0b4">   ← Mixed Case = described in place</tspan></text>
<text x="16" y="122" xml:space="preserve"><tspan fill="#2d5b7b"># LOG</tspan></text>
<text x="16" y="144" xml:space="preserve"><tspan fill="#2d5b7b">### </tspan><tspan fill="#3a7d6e">{{date}}</tspan><tspan fill="#1a1a2e"> — </tspan><tspan fill="#3a7d6e">{{event title}}</tspan></text>
<text x="16" y="164" xml:space="preserve"><tspan fill="#3a7d6e">{{</tspan></text>
<text x="16" y="184" xml:space="preserve"><tspan fill="#3a7d6e">    what changed</tspan><tspan fill="#9aa0b4">   ← multi-line: braces span their own lines</tspan></text>
<text x="16" y="204" xml:space="preserve"><tspan fill="#3a7d6e">}}</tspan></text>
<text x="16" y="226" xml:space="preserve"><tspan font-weight="bold" fill="#2d5b7b">### ...</tspan><tspan fill="#9aa0b4">   ← another entry repeats (at heading level)</tspan></text>
<text x="16" y="256" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">✂ ──── template notes ──── ✂</tspan><tspan fill="#9aa0b4">   ← cut on clone</tspan></text>
<text x="16" y="280" xml:space="preserve"><tspan font-weight="bold" fill="#b5651d">{{HOSTNAME}}</tspan><tspan fill="#1a1a2e"> — fills H1 · Access · filename</tspan></text>
<text x="16" y="300" xml:space="preserve"><tspan font-weight="bold" fill="#b5651d">{{PURCHASE_DATE}}</tspan><tspan fill="#1a1a2e"> — Acquired · filename prefix</tspan></text>
<text x="16" y="324" xml:space="preserve"><tspan fill="#5a6072">UPPER_SNAKE = variable (defined here)   ·   Mixed Case = one-off (in place)</tspan></text>
</svg>
