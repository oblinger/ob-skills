<text x="16" y="52" xml:space="preserve"><tspan fill="#1a1a2e">├─ _</tspan><tspan fill="#b5651d">{{DISK_LABEL}}</tspan><tspan fill="#1a1a2e"> Template.md</tspan><tspan fill="#9aa0b4">   marker → the main record</tspan></text>
<text x="16" y="72" xml:space="preserve"><tspan fill="#9aa0b4">│      </tspan><tspan fill="#2d5b7b"># </tspan><tspan fill="#b5651d">{{DISK_LABEL}}</tspan><tspan fill="#9aa0b4">   ## Physical   # LOG</tspan></text>
