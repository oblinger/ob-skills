<text x="16" y="122" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">✂ ──── template notes ──── ✂</tspan></text>
<text x="16" y="146" xml:space="preserve"><tspan font-weight="bold" fill="#b5651d">{{DISK_LABEL}}</tspan><tspan fill="#1a1a2e"> — one value names the folder, both files, and the H1 (unified)</tspan></text>
<text x="16" y="168" xml:space="preserve"><tspan fill="#5a6072">strip _ … Template → </tspan><tspan fill="#b5651d">{{DISK_LABEL}}</tspan><tspan fill="#5a6072">/</tspan><tspan fill="#9aa0b4">   (the whole folder clones as a unit, one per disk)</tspan></text>
