<svg xmlns="http://www.w3.org/2000/svg" width="496" height="232" viewBox="0 0 496 232" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="496" height="232" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-diagram-04 — Text fits its container (checked)</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `{ANCHOR}/**/*.svg`</tspan></text>
<text x="16" y="89" xml:space="preserve"><tspan font-weight="normal" fill="#1a1a2e">Every text element sits fully within the shape it labels —</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="normal" fill="#1a1a2e">no overflow past the container edge.</tspan></text>
<text x="16" y="149" xml:space="preserve"><tspan font-weight="bold" fill="#1a1a2e">Check pattern:</tspan><tspan font-weight="normal" fill="#1a1a2e"> for each text element, assert its bbox is</tspan></text>
<text x="16" y="169" xml:space="preserve"><tspan font-weight="normal" fill="#1a1a2e">inside the parent shape's bbox.</tspan></text>
<text x="16" y="209" xml:space="preserve"><tspan font-weight="bold" fill="#1a1a2e">Why:</tspan><tspan font-weight="normal" fill="#1a1a2e"> overflowing labels are the commonest hand-SVG defect.</tspan></text>
</svg>