<svg xmlns="http://www.w3.org/2000/svg" width="631" height="266" viewBox="0 0 631 266" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15">
<rect x="0" y="0" width="631" height="266" rx="10" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.5"/>
<text x="18" y="34" fill="#7b2d52" font-weight="bold" xml:space="preserve">### RULE R-diagram-04 — Text fits its container (checked)</text>
<text x="18" y="57" fill="#2d5b7b" font-weight="normal" xml:space="preserve">where:: {ANCHOR}/**/*.svg</text>
<text x="18" y="103" fill="#1a1a2e" font-weight="normal" xml:space="preserve">Every text element sits fully within the shape it labels —</text>
<text x="18" y="126" fill="#1a1a2e" font-weight="normal" xml:space="preserve">no overflow past the container edge.</text>
<text x="18" y="172" fill="#555555" font-weight="normal" xml:space="preserve">**Check pattern:** for each &lt;text&gt;, assert its bbox is inside</text>
<text x="18" y="195" fill="#1a1a2e" font-weight="normal" xml:space="preserve">the parent shape's bbox.</text>
<text x="18" y="241" fill="#555555" font-weight="normal" xml:space="preserve">**Why:** overflowing labels are the commonest hand-SVG defect.</text>
</svg>