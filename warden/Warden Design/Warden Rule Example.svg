<svg xmlns="http://www.w3.org/2000/svg" width="632" height="152" viewBox="0 0 632 152" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="632" height="152" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-backlog-01 — Rows carry a status bracket</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">description:: Every backlog item ends with a [Ready] / [Questions] bracket.</tspan></text>
<text x="16" y="69" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `{ANCHOR}/**/{NAME} Backlog.md`</tspan></text>
<text x="16" y="89" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">when:: write:markdown</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">if:: `'[Ready]' not in file.text and '[Questions]' not in file.text`</tspan></text>
<text x="16" y="129" xml:space="preserve"><tspan font-weight="normal" fill="#1a1a2e">A row is missing its status bracket — add [Ready] / [Questions] / [Verify].</tspan></text>
</svg>