<svg xmlns="http://www.w3.org/2000/svg" width="650" height="312" viewBox="0 0 650 312" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15">
<rect x="0" y="0" width="650" height="312" rx="10" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.5"/>
<text x="18" y="34" fill="#7b2d52" font-weight="bold" xml:space="preserve"># RULESET R-backlog</text>
<text x="18" y="57" fill="#2d5b7b" font-weight="normal" xml:space="preserve">include::</text>
<text x="18" y="80" fill="#2d5b7b" font-weight="normal" xml:space="preserve">where:: {ANCHOR}/**/{NAME} Backlog.md</text>
<text x="18" y="103" fill="#2d5b7b" font-weight="normal" xml:space="preserve">description:: Structure every {NAME} Backlog.md obeys.</text>
<text x="18" y="149" fill="#7b2d52" font-weight="bold" xml:space="preserve">### RULE R-backlog-01 — Rows carry a status bracket (checked)</text>
<text x="18" y="172" fill="#555555" font-weight="normal" xml:space="preserve">**Check pattern:** every item under a horizon H2 ends with a</text>
<text x="18" y="195" fill="#1a1a2e" font-weight="normal" xml:space="preserve">[Ready] / [Questions] / … bracket.</text>
<text x="18" y="241" fill="#7b2d52" font-weight="bold" xml:space="preserve">### RULE R-backlog-07 — Anchor has exactly one backlog (checked)</text>
<text x="18" y="264" fill="#2d5b7b" font-weight="normal" xml:space="preserve">where:: anchor</text>
<text x="18" y="287" fill="#555555" font-weight="normal" xml:space="preserve">**Check pattern:** exactly one "* Backlog.md" under the root.</text>
</svg>