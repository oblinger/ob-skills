<svg xmlns="http://www.w3.org/2000/svg" width="624" height="892" viewBox="0 0 624 892" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="624" height="892" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52"># RULESET R-warden-examples</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">include::</tspan></text>
<text x="16" y="69" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">description:: worked examples of Warden's rule-execution modes</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-01 — Has a description</tspan></text>
<text x="16" y="129" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `{ANCHOR}/**/R-*.md`</tspan></text>
<text x="16" y="149" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">check:: regex_present `^description::`</tspan></text>
<text x="16" y="189" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-02 — Every H2 section has a body</tspan></text>
<text x="16" y="209" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `{ANCHOR}/**/*.md`</tspan></text>
<text x="16" y="229" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```python</tspan></text>
<text x="16" y="249" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">def check(ctx):</tspan></text>
<text x="16" y="269" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">    for sec in ctx.sections(level=2):</tspan></text>
<text x="16" y="289" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">        if not sec.body.strip():</tspan></text>
<text x="16" y="309" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">            ctx.report(f'empty section: {sec.title}')</tspan></text>
<text x="16" y="329" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="369" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-03 — Summary matches the body</tspan></text>
<text x="16" y="389" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `{ANCHOR}/**/F[0-9][0-9][0-9] — *.md`</tspan></text>
<text x="16" y="409" xml:space="preserve"><tspan font-weight="normal" fill="#1a1a2e">The ## Summary faithfully reflects ## Design — no drift.</tspan></text>
<text x="16" y="449" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-04 — Open Questions still open</tspan></text>
<text x="16" y="469" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `{ANCHOR}/**/*.md`</tspan></text>
<text x="16" y="489" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```python</tspan></text>
<text x="16" y="509" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">def prepare(ctx):     # cheap: hand the LLM only one section</tspan></text>
<text x="16" y="529" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">    return ctx.section('## Open Questions')</tspan></text>
<text x="16" y="549" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="569" xml:space="preserve"><tspan font-weight="normal" fill="#1a1a2e">Judge each item prepare() returns: still unresolved? Report stale ones.</tspan></text>
<text x="16" y="609" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-05 — Don't ask whether to commit</tspan></text>
<text x="16" y="629" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">when:: skill:audit-q</tspan></text>
<text x="16" y="649" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `{ANCHOR}/**/{NAME} queries.md`</tspan></text>
<text x="16" y="669" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```python</tspan></text>
<text x="16" y="689" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">def check(ctx):</tspan></text>
<text x="16" y="709" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">    if ctx.has_question('push', 'commit'):</tspan></text>
<text x="16" y="729" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">        ctx.report(steer_for(ctx.git_aspect))  # tell the agent, don't ask</tspan></text>
<text x="16" y="749" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="789" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-06 — Diagram matches prose</tspan></text>
<text x="16" y="809" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `{ANCHOR}/**/*Architecture*.md`</tspan></text>
<text x="16" y="829" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">when:: write:markdown</tspan></text>
<text x="16" y="849" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">rerun:: significant</tspan></text>
<text x="16" y="869" xml:space="preserve"><tspan font-weight="normal" fill="#1a1a2e">The figure reflects the components in the prose; report drift.</tspan></text>
</svg>