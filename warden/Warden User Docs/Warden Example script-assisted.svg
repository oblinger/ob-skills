<svg xmlns="http://www.w3.org/2000/svg" width="680" height="232" viewBox="0 0 680 232" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="680" height="232" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-04 — Open Questions still open</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `**/*.md`</tspan></text>
<text x="16" y="69" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="89" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f"># the oracle only IDENTIFIES; the rule writes the directive the agent sees</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">q = file.section('## Open Questions')</tspan></text>
<text x="16" y="129" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">answer = ask_oracle(f'Which of these are answered elsewhere?'</tspan></text>
<text x="16" y="149" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">                    f' Reply "none" if none.\n\n{q}')</tspan></text>
<text x="16" y="169" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">if 'none' not in answer.lower():</tspan></text>
<text x="16" y="189" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">    tell(f'These look answered elsewhere — close or move to Resolved:\n{answer}')</tspan></text>
<text x="16" y="209" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
</svg>