<svg xmlns="http://www.w3.org/2000/svg" width="656" height="212" viewBox="0 0 656 212" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="656" height="212" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-04 — Open Questions still open</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `**/*.md`</tspan></text>
<text x="16" y="69" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="89" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f"># the oracle is context-less, so the prompt must make the reply a usable steer</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">q = file.section('## Open Questions')</tspan></text>
<text x="16" y="129" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">response = ask_oracle(f'Which of these are already answered elsewhere? Name'</tspan></text>
<text x="16" y="149" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">                      f' each and say to close it. None? reply empty.\n\n{q}')</tspan></text>
<text x="16" y="169" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">tell(response)   # empty reply -&gt; nothing told -&gt; the rule passed</tspan></text>
<text x="16" y="189" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
</svg>