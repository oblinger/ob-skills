<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-04 — Open Questions still open</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `**/*.md`</tspan></text>
<text x="16" y="69" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="89" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f"># hand the oracle one question + just this slice; it returns a list</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">resolved = ask_oracle('which of these are already answered elsewhere?',</tspan></text>
<text x="16" y="129" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">                      file.section('## Open Questions'))</tspan></text>
<text x="16" y="149" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">for question in resolved:</tspan></text>
<text x="16" y="169" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">    tell(f'{question} looks resolved — close it or move to Resolved')</tspan></text>
<text x="16" y="189" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
