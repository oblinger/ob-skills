<svg xmlns="http://www.w3.org/2000/svg" width="680" height="192" viewBox="0 0 680 192" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="680" height="192" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-08 — Log architecture edits</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">description:: Every edit to an architecture doc is appended to an audit log.</tspan></text>
<text x="16" y="69" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `**/*Architecture*.md`</tspan></text>
<text x="16" y="89" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">when:: write:markdown</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="129" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">with open(f'{anchor.root}/.audit/edits.log', 'a') as log:   # a run: plain Python</tspan></text>
<text x="16" y="149" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">    log.write(f'{now}  {file.path}\n')</tspan></text>
<text x="16" y="169" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
</svg>