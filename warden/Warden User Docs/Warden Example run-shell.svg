<svg xmlns="http://www.w3.org/2000/svg" width="592" height="172" viewBox="0 0 592 172" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="592" height="172" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-09 — Auto-format Python on write</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">description:: Python files are formatted with black on every write.</tspan></text>
<text x="16" y="69" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `**/*.py`</tspan></text>
<text x="16" y="89" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">when:: write:python</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="129" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">sh(['black', '-q', file.path])     # a run via shell — format in place</tspan></text>
<text x="16" y="149" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
</svg>