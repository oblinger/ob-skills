<svg xmlns="http://www.w3.org/2000/svg" width="552" height="172" viewBox="0 0 552 172" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">
<rect x="0" y="0" width="552" height="172" rx="9" fill="#f8f9fb" stroke="#c9cde0" stroke-width="1.3"/>
<text x="16" y="29" xml:space="preserve"><tspan font-weight="bold" fill="#7b2d52">### RULE R-ex-02 — No empty sections</tspan></text>
<text x="16" y="49" xml:space="preserve"><tspan font-weight="normal" fill="#2d5b7b">where:: `**/*.md`</tspan></text>
<text x="16" y="69" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
<text x="16" y="89" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">for s in ctx.sections(level=2):</tspan></text>
<text x="16" y="109" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">    if not s.body.strip():</tspan></text>
<text x="16" y="129" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">        ctx.tell(f"'{s.title}' is empty — add a body or drop it")</tspan></text>
<text x="16" y="149" xml:space="preserve"><tspan font-weight="normal" fill="#2f7d4f">```</tspan></text>
</svg>