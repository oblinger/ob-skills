<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380"
     style="background:white" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#1e1e1e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text id="title" x="450" y="36" font-size="22" font-weight="600" text-anchor="middle"
        fill="#1e1e1e">Key system parts</text>

  <!-- Skills box (top-left, blue, full height) -->
  <rect id="skills-box" x="80" y="70" width="180" height="160" rx="10"
        fill="#bac8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text id="skills-title" x="170" y="118" font-size="22" font-weight="600" text-anchor="middle"
        fill="#1e1e1e">Skills</text>
  <text id="skills-subtitle" x="170" y="162" font-size="22" font-style="italic" text-anchor="middle"
        font-family="Palatino, 'Palatino Linotype', Georgia, serif" fill="#1e1e1e">verbs</text>
  <text id="skills-small" x="170" y="208" font-size="11" text-anchor="middle"
        fill="#1e1e1e">Actions taken</text>

  <!-- Facets box (top-middle, green, SHORTER) -->
  <rect id="facets-box" x="320" y="130" width="260" height="100" rx="10"
        fill="#ebfbee" stroke="#1e1e1e" stroke-width="2"/>
  <text id="facets-title" x="450" y="158" font-size="22" font-weight="600" text-anchor="middle"
        fill="#1e1e1e">Facets</text>
  <text id="facets-subtitle" x="450" y="190" font-size="22" font-style="italic" text-anchor="middle"
        font-family="Palatino, 'Palatino Linotype', Georgia, serif" fill="#1e1e1e">nouns</text>
  <text id="facets-small" x="450" y="216" font-size="11" text-anchor="middle"
        fill="#1e1e1e">Docs created</text>

  <!-- Disciplines box (top-right, yellow, full height) -->
  <rect id="disciplines-box" x="640" y="70" width="180" height="160" rx="10"
        fill="#fff9db" stroke="#1e1e1e" stroke-width="2"/>
  <text id="disciplines-title" x="730" y="118" font-size="22" font-weight="600" text-anchor="middle"
        fill="#1e1e1e">Disciplines</text>
  <text id="disciplines-subtitle" x="730" y="162" font-size="22" font-style="italic" text-anchor="middle"
        font-family="Palatino, 'Palatino Linotype', Georgia, serif" fill="#1e1e1e">adjectives</text>
  <text id="disciplines-small" x="730" y="208" font-size="11" text-anchor="middle"
        fill="#1e1e1e">Systematic behaviors</text>

  <!-- Rules band (bottom, orange, thin, full width) -->
  <rect id="rules-box" x="80" y="270" width="740" height="48" rx="10"
        fill="#ffe8cc" stroke="#1e1e1e" stroke-width="2"/>
  <text id="rules-title" x="110" y="302" font-size="22" font-weight="600" text-anchor="start"
        fill="#1e1e1e">Rules</text>
  <text id="rules-subtitle" x="500" y="302" font-size="22" font-style="italic" text-anchor="middle"
        font-family="Palatino, 'Palatino Linotype', Georgia, serif" fill="#1e1e1e">directives and constraints</text>

  <!-- Arrow: Skills → Facets ("creates") -->
  <line id="arrow-skills-facets" x1="260" y1="180" x2="320" y2="180"
        stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text id="label-creates" x="290" y="170" font-size="13" font-style="italic" text-anchor="middle"
        fill="#1971c2">creates</text>

  <!-- Arrow: Disciplines → Skills, across the top, over the shorter Facets ("modifies") -->
  <line id="arrow-disc-skills" x1="640" y1="90" x2="260" y2="90"
        stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text id="label-modifies" x="450" y="82" font-size="13" font-style="italic" text-anchor="middle"
        fill="#1971c2">modifies</text>

  <!-- Arrow: Disciplines → Facets, short (no label) -->
  <line id="arrow-disc-facets" x1="640" y1="180" x2="580" y2="180"
        stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrows: Rules → {Skills, Facets, Disciplines} (no labels) -->
  <line id="arrow-rules-skills" x1="170" y1="270" x2="170" y2="230"
        stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line id="arrow-rules-facets" x1="450" y1="270" x2="450" y2="230"
        stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line id="arrow-rules-disc" x1="730" y1="270" x2="730" y2="230"
        stroke="#1e1e1e" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
